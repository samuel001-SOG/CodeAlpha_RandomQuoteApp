// ─── HELPERS ─────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}

function goScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById("screen-" + id).classList.add("active");
  state.screen = id;
}

function buildPool(answers) {
  const scores = {};
  answers.forEach(a => a.cats.forEach(c => { scores[c] = (scores[c]||0)+1; }));
  const top = Object.entries(scores).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([c])=>c);
  let pool = [];
  top.forEach(cat => {
    if (QUOTE_DB[cat]) pool = pool.concat(QUOTE_DB[cat].map(q => ({...q, cat})));
  });
  return { pool: pool.sort(()=>Math.random()-0.5), topCats: top };
}

    chip.className = "chip";
    chip.style.cssText = `color:${m.color};border-color:${m.color}35;background:${m.color}08`;
    chip.textContent = `${m.emoji} ${m.label}`;
    chips.appendChild(chip);
  });
}

// ─── QA ──────────────────────────────────────────────────────────────────────
function startQA() { state.qaStep = 0; state.answers = []; state.selected = null; renderQA(); goScreen("qa"); }

function renderQA() {
  const q = QUESTIONS[state.qaStep];
  // dots
  const dots = document.getElementById("progress-dots");
  dots.innerHTML = "";
  QUESTIONS.forEach((_, i) => {
    const d = document.createElement("div");
    d.className = "progress-dot" + (i <= state.qaStep ? " done" : "");
    dots.appendChild(d);
  });
  document.getElementById("qa-step-label").textContent = `Question ${state.qaStep+1} / ${QUESTIONS.length}`;
  document.getElementById("qa-pct-label").textContent = `${Math.round((state.qaStep/QUESTIONS.length)*100)}%`;
  document.getElementById("qa-emoji").textContent = q.emoji;
  document.getElementById("qa-question").textContent = q.question;

  const opts = document.getElementById("qa-options");
  opts.innerHTML = "";
  q.options.forEach(opt => {
    const row = document.createElement("div");
    row.className = "opt";
    row.innerHTML = `<div class="opt-radio"><div class="opt-dot"></div></div>${opt.label}`;
    row.onclick = () => { state.selected = opt; renderQA(); };
    if (state.selected && state.selected.value === opt.value) row.classList.add("selected");
    opts.appendChild(row);
  });

  const btn = document.getElementById("continue-btn");
  btn.textContent = state.qaStep === QUESTIONS.length-1 ? "Reveal My Feed ✦" : "Continue →";
  btn.className = "continue-btn" + (state.selected ? " ready" : "");
}

function qaBack() {
  if (state.qaStep > 0) { state.qaStep--; state.selected = null; renderQA(); }
  else { restart(); }
}

function qaContinue() {
  if (!state.selected) return;
  const newAnswers = [...state.answers, state.selected];
  state.answers = newAnswers;
  if (state.qaStep < QUESTIONS.length - 1) {
    const card = document.getElementById("qa-card");
    card.classList.add("out");
    setTimeout(() => { state.qaStep++; state.selected = null; renderQA(); card.classList.remove("out"); }, 280);
  } else {
    const { pool, topCats } = buildPool(newAnswers);
    state.pool = pool; state.topCats = topCats; state.idx = 0; state.streak = 0;
    renderFeed(); goScreen("feed");
  }
}

// ─── FEED ─────────────────────────────────────────────────────────────────────
function renderFeed() {
  const quote = state.pool[state.idx];
  if (!quote) return;
  const m = CAT_META[quote.cat];

  // topbar cats
  const tc = document.getElementById("top-cats");
  tc.innerHTML = "";
  state.topCats.slice(0,4).forEach(c => {
    const cm = CAT_META[c];
    const chip = document.createElement("div");
    chip.className = "top-chip";
    chip.style.cssText = `color:${cm.color};border-color:${cm.color}35;background:${cm.color}08`;
    chip.textContent = `${cm.emoji} ${cm.label}`;
    tc.appendChild(chip);
  });

  // streak
  const sp = document.getElementById("streak-pill");
  if (state.streak > 0) { sp.style.display = "block"; sp.textContent = `🔥 ${state.streak} explored today`; }
  else sp.style.display = "none";

  // card
  const card = document.getElementById("quote-card");
  card.style.border = `1px solid ${m.color}28`;
  card.style.boxShadow = `0 40px 80px rgba(0,0,0,0.5), 0 0 0 1px ${m.color}0d`;

  document.getElementById("card-glow").style.background = `radial-gradient(circle, ${m.color}18, transparent 70%)`;
  const badge = document.getElementById("card-cat-badge");
  badge.style.cssText = `position:absolute;top:22px;right:24px;padding:4px 13px;border-radius:100px;border:1px solid ${m.color}40;color:${m.color};font-size:10px;font-family:'JetBrains Mono',monospace;background:${m.color}0d`;
  badge.textContent = `${m.emoji} ${m.label}`;
  document.getElementById("card-open-mark").style.color = m.color;
  document.getElementById("card-quote").textContent = quote.text;
  document.getElementById("card-author").style.color = m.color;
  document.getElementById("card-author").textContent = `— ${quote.author}`;
  document.getElementById("divider-l").style.background = `${m.color}28`;
  document.getElementById("divider-r").style.background = `${m.color}28`;

  // buttons
  const nqb = document.getElementById("new-quote-btn");
  nqb.style.cssText = `padding:14px 44px;border:none;border-radius:100px;color:#000;font-weight:700;font-size:13px;font-family:'JetBrains Mono',monospace;letter-spacing:2px;text-transform:uppercase;cursor:pointer;background:linear-gradient(135deg,${m.color},${m.color}bb);box-shadow:0 8px 28px ${m.color}45;transition:all 0.2s ease`;

  const saveBtn = document.getElementById("save-btn");
  const isSaved = state.saved.some(q => q.text === quote.text);
  saveBtn.textContent = isSaved ? "✓ Saved" : "Save";
  saveBtn.style.cssText = `padding:14px 22px;background:transparent;border-radius:100px;font-size:12px;font-family:monospace;cursor:pointer;transition:all 0.2s ease;border:1px solid ${m.color}45;color:${m.color}`;

  document.getElementById("copy-btn").style.cssText = `padding:14px 22px;background:transparent;border:1px solid #161728;border-radius:100px;color:#444;font-size:12px;font-family:monospace;cursor:pointer;transition:all 0.2s ease`;

  document.getElementById("feed-counter").textContent = `${state.idx+1} / ${state.pool.length} in your personalized feed`;
  document.getElementById("saved-count-btn").textContent = `✦ ${state.saved.length}`;
}

function nextQuote() {
  const card = document.getElementById("quote-card");
  card.classList.add("hidden");
  setTimeout(() => {
    state.idx = (state.idx+1) % state.pool.length;
    state.streak++;
    renderFeed();
    card.classList.remove("hidden");
  }, 300);
}

function saveQuote() {
  const quote = state.pool[state.idx];
  if (!quote) return;
  if (!state.saved.some(q => q.text === quote.text)) {
    state.saved.push(quote);
    showToast("✦ Quote saved!");
  } else {
    showToast("Already saved!");
  }
  renderFeed();
}

function copyQuote() {
  const quote = state.pool[state.idx];
  if (!quote) return;
  navigator.clipboard.writeText(`"${quote.text}" — ${quote.author}`).then(() => {
    const btn = document.getElementById("copy-btn");
    btn.textContent = "Copied ✓";
    setTimeout(() => { btn.textContent = "Copy"; }, 2000);
  });
}

function showSaved() {
  renderSaved(); goScreen("saved");
}

function renderSaved() {
  document.getElementById("saved-title").textContent = `Saved Quotes (${state.saved.length})`;
  const content = document.getElementById("saved-content");
  if (state.saved.length === 0) {
    content.innerHTML = `<div class="saved-empty"><div class="saved-empty-icon">📌</div><p style="font-style:italic;color:#444">Nothing saved yet. Hit "Save" on quotes that move you.</p></div>`;
    return;
  }
  content.innerHTML = `<div class="saved-list">${state.saved.map(q => {
    const m = CAT_META[q.cat] || { color:"#6366f1", emoji:"✦", label:"" };
    return `<div class="saved-item" style="border-color:${m.color}25">
      <p class="saved-item-text">"${q.text}"</p>
      <div class="saved-item-meta" style="color:${m.color}">
        <span>— ${q.author}</span><span style="color:#222">·</span><span>${m.emoji} ${m.label}</span>
      </div>
    </div>`;
  }).join("")}</div>`;
}

function goFeed() { renderFeed(); goScreen("feed"); }
function restart() { state = { screen:"landing", qaStep:0, answers:[], selected:null, pool:[], topCats:[], idx:0, streak:0, saved:[], visible:true }; goScreen("landing"); }

// ─── BOOT ────────────────────────────────────────────────────────────────────
initLanding();
</script>
</body>
</html>
